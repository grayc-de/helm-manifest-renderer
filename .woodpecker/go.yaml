when:
  - branch: main
    event:
      - pull_request
      - push
      - manual

steps:
  fmt:
    image: golang:1.26
    commands:
      - make fmt-check

  vet:
    image: golang:1.26
    commands:
      - make vet

  test:
    image: golang:1.26
    commands:
      - make test

  build:
    image: golang:1.26
    commands:
      - pwd
      - ls -la
      - find . -maxdepth 2 -type d | sort
      - git rev-parse HEAD
      - make build
