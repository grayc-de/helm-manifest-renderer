when:
  event:
    - manual
    - pull_request
  branch: main
  path:
    - .woodpecker/lint.yaml
    - .markdownlint.yaml
    - Dockerfile
    - "**/*.yaml"
    - "**/*.md"

steps:
  yaml:
    image: kokuwaio/yamllint:v1.38.0
    depends_on: []
    when:
      path:
        - .woodpecker/lint.yaml
        - "**/*.yaml"

  markdown:
    image: kokuwaio/markdownlint:0.48.0
    depends_on: []
    when:
      path:
        - .woodpecker/lint.yaml
        - "**/*.md"
        - .markdownlint.yaml

  dockerfile:
    image: kokuwaio/hadolint:v2.14.0
    depends_on: []
    when:
      path:
        - .woodpecker/lint.yaml
        - Dockerfile
