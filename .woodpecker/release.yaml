when:
  event: tag
  ref: refs/tags/v*

steps:
  build:
    image: golang:1.26
    commands:
      - make release-linux-amd64 VERSION=${CI_COMMIT_TAG}
      - |
        PREV_TAG="$(git describe --tags --abbrev=0 "${CI_COMMIT_TAG}^" 2>/dev/null || true)"
        if [ -n "$PREV_TAG" ]; then
          git log --first-parent --pretty='- %s' "${PREV_TAG}..${CI_COMMIT_TAG}" > dist/changelog.txt
        else
          git log --first-parent --pretty='- %s' HEAD > dist/changelog.txt
        fi
      - |
        if [ ! -s dist/changelog.txt ]; then
          printf '%s\n' '- No changes detected.' > dist/changelog.txt
        fi
      - |
        awk -v version="${CI_COMMIT_TAG}" '
          FILENAME == ARGV[1] { changelog = changelog $0 "\n"; next }
          {
            gsub(/\{\{VERSION\}\}/, version)
            if ($0 == "{{CHANGELOG}}") {
              printf "%s", changelog
            } else {
              print
            }
          }
        ' dist/changelog.txt .woodpecker/release.md > dist/release.md
      - ls -la dist
      - echo "--- changelog.txt ---"
      - sed -n '1,120p' dist/changelog.txt
      - echo "--- release.md template ---"
      - sed -n '1,120p' .woodpecker/release.md
      - echo "--- generated dist/release.md ---"
      - sed -n '1,120p' dist/release.md

  release:
    image: git.grayc.dev/grayc-devops/woodpecker-simple-release:v0.1.5
    depends_on: [build]
    settings:
      forge_url: https://git.grayc.dev
      gitea_token: {from_secret: GITEA_TOKEN}
      release_docu: dist/release.md
      release_files:
        - file: dist/helm-manifest-renderer_${CI_COMMIT_TAG}_linux_amd64.tar.gz
          type: application/gzip
        - file: dist/helm-manifest-renderer_${CI_COMMIT_TAG}_checksums.txt
          type: text/plain

  image:
    image: kokuwaio/buildctl:v0.28.0
    depends_on: [build]
    settings:
      platform: linux/amd64
      name: "git.grayc.dev/grayc-devops/helm-manifest-renderer:${CI_COMMIT_TAG}"
      auth:
        git.grayc.dev:
          username: {from_secret: CONTAINER_REGISTRY_USERNAME}
          password: {from_secret: CONTAINER_REGISTRY_PASSWORD}
