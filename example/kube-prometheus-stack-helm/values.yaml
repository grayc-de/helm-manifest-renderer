fullnameOverride: kube-prometheus-stack
crds:
  enabled: true
  upgradeJob:
    enabled: false
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        memory: 256Mi
prometheus:
  prometheusSpec:
    podMetadata:
      annotations:
        fluentbit.io/parser: logfmt
    enableFeatures:
      - remote-write-receiver
      - concurrent-rule-eval
    ruleSelector:
      matchExpressions:
        - key: role
          operator: In
          values: [alert-rules, recording-rules, default-rules]
    ruleNamespaceSelector: {}
    additionalArgs:
      - name: query.max-concurrency
        value: "50"
    containers:
      - name: prometheus
        readinessProbe:
          failureThreshold: 500
    resources:
      requests:
        cpu: 100m
        memory: 2Gi
      limits:
        memory: 4Gi
    remoteWrite:
      - url: http://vm-server.observability.svc:8428/api/v1/write
        queueConfig:
          maxSamplesPerSend: 1000
          batchSendDeadline: 10s
    retention: 5d
    ruleSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    serviceMonitorSelectorNilUsesHelmValues: false
    probeSelectorNilUsesHelmValues: false
    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes:
            - ReadWriteOnce
          storageClassName: hcloud-retain
          resources:
            requests:
              storage: 20Gi

    additionalScrapeConfigs:
      # Scrape config for service endpoints.
      #
      # The relabeling allows the actual service scrape endpoint to be configured
      # via the following annotations:
      #
      # * `prometheus.io/scrape`: Only scrape services that have a value of `true`
      # * `prometheus.io/scheme`: If the metrics endpoint is secured then you will need
      # to set this to `https` & most likely set the `tls_config` of the scrape config.
      # * `prometheus.io/path`: If the metrics path is not `/metrics` override this.
      # * `prometheus.io/port`: If the metrics are exposed on a different port to the
      # service then set this appropriately.
      - job_name: kubernetes-service-endpoints
        kubernetes_sd_configs:
          - role: endpoints
        relabel_configs:
          - source_labels:
              - __meta_kubernetes_service_annotation_prometheus_io_scrape
            action: keep
            regex: true
          - source_labels:
              - __meta_kubernetes_service_annotation_prometheus_io_scheme
            action: replace
            target_label: __scheme__
            regex: (https?)
          - source_labels:
              - __meta_kubernetes_service_annotation_prometheus_io_path
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels:
              - __address__
              - __meta_kubernetes_service_annotation_prometheus_io_port
            action: replace
            target_label: __address__
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
          - action: labelmap
            regex: __meta_kubernetes_service_label_(.+)
          - source_labels:
              - __meta_kubernetes_namespace
            action: replace
            target_label: kubernetes_namespace
          - source_labels:
              - __meta_kubernetes_service_name
            action: replace
            target_label: kubernetes_name
          - source_labels:
              - __meta_kubernetes_service_name
            action: drop
            regex: node-exporter
      - job_name: kubernetes-pods
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels:
              - __meta_kubernetes_pod_annotation_prometheus_io_scrape
            action: keep
            regex: true
          - source_labels:
              - __meta_kubernetes_pod_annotation_prometheus_io_path
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels:
              - __address__
              - __meta_kubernetes_pod_annotation_prometheus_io_port
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
          - action: labelmap
            regex: __meta_kubernetes_pod_label_(.+)
          - source_labels:
              - __meta_kubernetes_namespace
            action: replace
            target_label: kubernetes_namespace
          - source_labels:
              - __meta_kubernetes_pod_name
            action: replace
            target_label: kubernetes_pod_name
prometheusRule:
  labels:
    role: alert-rules
prometheusOperator:
  podAnnotations:
    fluentbit.io/parser: logfmt
  admissionWebhooks:
    certManager:
      enabled: true
      issuerRef:
        name: selfsigned
        kind: Issuer
  resources:
    limits:
      memory: 200Mi
    requests:
      cpu: 100m
      memory: 100Mi
  prometheusConfigReloader:
    resources:
      requests:
        cpu: 10m
        memory: 50Mi
      limits:
        cpu: 100m
        memory: 50Mi
alertmanager:
  annotations:
    fluentbit.io/parser: logfmt
  config:
    templates:
      - /etc/alertmanager/configmaps/alertmanager-templates/*.tmpl
  tplConfig: true
  alertmanagerSpec:
    containers:
      - name: alertmanager
        startupProbe:
          httpGet:
            path: /-/ready
            port: 9093
          failureThreshold: 30
          periodSeconds: 5
        readinessProbe:
          httpGet:
            path: /-/ready
            port: 9093
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 5
        livenessProbe:
          httpGet:
            path: /-/healthy
            port: 9093
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
      - name: config-reloader
        startupProbe:
          httpGet:
            path: /healthz
            port: 8080
          failureThreshold: 30
          periodSeconds: 5
        readinessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 5
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
    alertmanagerConfigSelector:
      matchLabels:
        alertmanagerConfig: enabled
    alertmanagerConfigNamespaceSelector: {}
    alertmanagerConfiguration:
      name: alertmanager-default-config
      templates:
        - configMap:
            name: alertmanager-templates
            key: slack.tmpl
    resources:
      requests:
        cpu: 10m
        memory: 100Mi
      limits:
        memory: 800Mi
    storage:
      volumeClaimTemplate:
        spec:
          accessModes:
            - ReadWriteOnce
          storageClassName: hcloud-retain
          resources:
            requests:
              storage: 2Gi
prometheus-node-exporter:
  podAnnotations:
    fluentbit.io/parser: logfmt
  resources:
    limits:
      cpu: 400m
      memory: 50Mi
    requests:
      cpu: 10m
      memory: 30Mi
coreDns:
  enabled: false
grafana:
  enabled: false
  forceDeployDashboards: true
  operator:
    dashboardsConfigMapRefEnabled: true
    folder: null
    folderUID: kube-prometheus-stack
    matchLabels:
      grafana.integreatly.org/instance: devops
kubeControllerManager:
  enabled: false
kubeEtcd:
  enabled: false
kubeProxy:
  enabled: false
kubeScheduler:
  enabled: false
kubelet:
  serviceMonitor:
    cAdvisorMetricRelabelings:
      - sourceLabels:
          - node
        separator: ;
        regex: (.*)
        targetLabel: instance
        replacement: $1
        action: replace
      - sourceLabels:
          - container
        targetLabel: container_name
        regex: (.+)
        action: replace
      - sourceLabels:
          - pod
        targetLabel: pod_name
        regex: (.+)
        action: replace
defaultRules:
  create: true
  rules:
    alertmanager: true
    etcd: false
    general: true
    k8s: true
    kubeApiserver: true
    kubeApiserverAvailability: true
    kubeApiserverError: true
    kubeApiserverSlos: true
    kubelet: false  # kubelet.rules.yaml
    kubePrometheusGeneral: true
    kubePrometheusNodeAlerting: true
    kubePrometheusNodeRecording: true
    kubernetesAbsent: true
    kubernetesApps: true
    kubernetesResources: false  # kubernetes-resources.yaml
    kubernetesStorage: true
    kubernetesSystem: false  # kubernetes-system-apiserver.yaml, kubernetes-system-kubelet.yaml, kubernetes-system.yaml
    kubeScheduler: false
    kubeStateMetrics: true
    network: true
    node: true
    prometheus: true
    prometheusOperator: true
    time: true
kube-state-metrics:
  podAnnotations:
    fluentbit.io/parser: klog
  resources:
    limits:
      cpu: 250m
      memory: 500Mi
    requests:
      cpu: 50m
      memory: 300Mi
  rbac:
    extraRules:
      - apiGroups:
          - source.toolkit.fluxcd.io
          - kustomize.toolkit.fluxcd.io
          - helm.toolkit.fluxcd.io
          - notification.toolkit.fluxcd.io
          - image.toolkit.fluxcd.io
        resources:
          - gitrepositories
          - buckets
          - helmrepositories
          - helmcharts
          - ocirepositories
          - kustomizations
          - helmreleases
          - alerts
          - providers
          - receivers
          - imagerepositories
          - imagepolicies
          - imageupdateautomations
        verbs: [list, watch]
  customResourceState:
    enabled: true
    config:
      spec:
        resources:
          - groupVersionKind:
              group: kustomize.toolkit.fluxcd.io
              version: v1
              kind: Kustomization
            metricNamePrefix: gotk
            metrics:
              - name: resource_info
                help: The current state of a Flux Kustomization.
                each:
                  type: Info
                  info:
                    labelsFromPath:
                      name: [metadata, name]
                labelsFromPath:
                  exported_namespace: [metadata, namespace]
                  ready: [status, conditions, "[type=Ready]", status]
                  suspended: [spec, suspend]
                  revision: [status, lastAppliedRevision]
                  source_name: [spec, sourceRef, name]
          - groupVersionKind:
              group: source.toolkit.fluxcd.io
              version: v1
              kind: GitRepository
            metricNamePrefix: gotk
            metrics:
              - name: resource_info
                help: The current state of a Flux GitRepository.
                each:
                  type: Info
                  info:
                    labelsFromPath:
                      name: [metadata, name]
                labelsFromPath:
                  exported_namespace: [metadata, namespace]
                  ready: [status, conditions, "[type=Ready]", status]
                  suspended: [spec, suspend]
                  revision: [status, artifact, revision]
                  url: [spec, url]
